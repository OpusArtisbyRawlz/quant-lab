name: CI

# Guards against the regression this workflow was created to catch: src/ modules
# that agents/experiment_runner imports at load time going missing on a clean
# checkout (untracked / git-ignored files). Runs on every push and PR.

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import-closure guard (research engine must import on a clean checkout)
        run: |
          python -c "import agents.experiment_runner.runner; import agents.experiment_runner.robustness; print('import closure OK')"
          python -m pytest agents/tests/test_import_closure.py -q

      - name: Full test suite
        run: python -m pytest agents/tests/ -q
